[build]
  command = "npm run build"
  publish = "dist"

# Netlify serves real files in `dist` before this fallback.
# If sitemap ever returned HTML, check Site settings → Build & deploy → Post processing.

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
