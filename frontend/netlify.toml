[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "http://smtechsolutions.in/*"
  to = "https://smtechsolutions.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.smtechsolutions.in/*"
  to = "https://smtechsolutions.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.smtechsolutions.in/*"
  to = "https://smtechsolutions.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
